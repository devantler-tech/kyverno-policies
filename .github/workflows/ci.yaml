---
name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required:
    name: CI - Required Checks
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install policy tooling
        run: brew install actionlint kubernetes-cli kyverno shellcheck yamllint yq zizmor

      - name: Validate YAML
        run: yamllint .

      - name: Render catalog
        run: kubectl kustomize . > /dev/null

      - name: Test policy behavior
        # Discovers every tests/*/kyverno-test.yaml recursively, so a new policy's
        # fixture is executed as soon as it exists — no test-runner edit required.
        run: kyverno test . --require-tests --detailed-results --remove-color

      - name: Test policy structure
        run: bash scripts/test-policy-catalog.sh

      - name: Validate scripts and workflow
        run: |
          shellcheck scripts/test-policy-catalog.sh
          actionlint .github/workflows/ci.yaml
          zizmor .github/workflows/ci.yaml
          git diff --check
