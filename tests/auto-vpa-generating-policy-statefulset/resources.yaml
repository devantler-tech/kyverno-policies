---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shared
  namespace: test
spec:
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: registry.k8s.io/pause:3.10
