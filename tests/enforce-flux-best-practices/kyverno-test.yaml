---
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: enforce-flux-best-practices-validates-reliability-fields
policies:
  - ../../policies/best-practices/enforce-flux-best-practices.yaml
resources:
  - resources.yaml
results:
  - policy: enforce-flux-best-practices
    rule: kustomization-recommended-settings
    resources:
      - test/compliant-kustomization
    kind: Kustomization
    result: pass
  - policy: enforce-flux-best-practices
    rule: kustomization-recommended-settings
    resources:
      - test/incomplete-kustomization
    kind: Kustomization
    result: fail
  - policy: enforce-flux-best-practices
    rule: kustomization-recommended-settings
    resources:
      - flux-system/flux-system
    kind: Kustomization
    result: skip
  - policy: enforce-flux-best-practices
    rule: helmrelease-recommended-settings
    resources:
      - test/compliant-helmrelease
    kind: HelmRelease
    result: pass
  - policy: enforce-flux-best-practices
    rule: helmrelease-recommended-settings
    resources:
      - test/compliant-strategy-helmrelease
    kind: HelmRelease
    result: pass
  - policy: enforce-flux-best-practices
    rule: helmrelease-recommended-settings
    resources:
      - test/incomplete-helmrelease
    kind: HelmRelease
    result: fail
