---
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: add-recommended-labels-preserves-authored-values
policies:
  - ../../policies/best-practices/add-recommended-labels.yaml
resources:
  - resources.yaml
results:
  - policy: add-recommended-labels
    rule: add-workload-labels
    resources:
      - apps/unlabelled-deployment
      - apps/authored-statefulset
      - apps/partial-daemonset
      # Accept side of the 63-character name boundary.
      - apps/bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    patchedResources: patched-resources.yaml
    result: pass
  - policy: add-recommended-labels
    rule: add-workload-labels
    resources:
      - apps/authored-deployment
      - apps/aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - apps/
      - kube-system/system-deployment
      # The other two excluded system namespaces, previously unexercised.
      - kube-public/public-deployment
      - kube-node-lease/lease-deployment
      - apps/nonmatching-job
    result: skip
