---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unlabelled-deployment
  namespace: apps
spec:
  selector:
    matchLabels:
      workload: unlabelled-deployment
  template:
    metadata:
      labels:
        workload: unlabelled-deployment
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: authored-statefulset
  namespace: apps
  labels:
    app: authored-app
    app.kubernetes.io/name: authored-workload-name
spec:
  serviceName: authored-statefulset
  selector:
    matchLabels:
      workload: authored-statefulset
  template:
    metadata:
      labels:
        workload: authored-statefulset
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: partial-daemonset
  namespace: apps
  labels:
    app: authored-daemon-app
spec:
  selector:
    matchLabels:
      workload: partial-daemonset
  template:
    metadata:
      labels:
        workload: partial-daemonset
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authored-deployment
  namespace: apps
  labels:
    app: authored-app
    app.kubernetes.io/name: authored-workload-name
spec:
  selector:
    matchLabels:
      workload: authored-deployment
  template:
    metadata:
      labels:
        workload: authored-deployment
        app.kubernetes.io/name: authored-pod-name
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  namespace: apps
spec:
  selector:
    matchLabels:
      workload: long-name
  template:
    metadata:
      labels:
        workload: long-name
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  generateName: generated-workload-
  namespace: apps
spec:
  selector:
    matchLabels:
      workload: generated-workload
  template:
    metadata:
      labels:
        workload: generated-workload
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-deployment
  namespace: kube-system
spec:
  selector:
    matchLabels:
      workload: system-deployment
  template:
    metadata:
      labels:
        workload: system-deployment
    spec:
      containers:
        - name: app
          image: registry.example/system/app:v1
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nonmatching-job
  namespace: apps
spec:
  template:
    metadata:
      labels:
        workload: nonmatching-job
    spec:
      restartPolicy: Never
      containers:
        - name: app
          image: registry.example/team/job:v1
---
# Excluded namespace: kube-public. The policy excludes three system namespaces;
# without a resource in each, only the kube-system arm is actually exercised.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-deployment
  namespace: kube-public
spec:
  selector:
    matchLabels:
      workload: public-deployment
  template:
    metadata:
      labels:
        workload: public-deployment
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
# Excluded namespace: kube-node-lease.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lease-deployment
  namespace: kube-node-lease
spec:
  selector:
    matchLabels:
      workload: lease-deployment
  template:
    metadata:
      labels:
        workload: lease-deployment
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
---
# Accept side of the 63-character label-length boundary. The 64-character
# resource above proves the reject side; without this one, lowering the
# precondition's limit would not fail any test.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
  namespace: apps
spec:
  selector:
    matchLabels:
      workload: boundary
  template:
    metadata:
      labels:
        workload: boundary
    spec:
      containers:
        - name: app
          image: registry.example/team/app:v1
