---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: missing-defaults
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: remediate-on-failure-with-siblings
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    strategy:
      name: RemediateOnFailure
    timeout: 10m
    crds: CreateReplace
    disableWait: true
    remediation:
      ignoreTestFailures: true
  upgrade:
    strategy:
      name: RemediateOnFailure
    timeout: 15m
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      ignoreTestFailures: false
      strategy: rollback
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: install-retry-on-failure
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    cleanupOnFail: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: upgrade-retry-on-failure
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    disableWait: true
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: explicit-zero-false
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    remediation:
      retries: 0
      remediateLastFailure: false
  upgrade:
    remediation:
      retries: 0
      remediateLastFailure: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: explicit-unlimited-false-and-upgrade-strategy
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    remediation:
      retries: -1
      remediateLastFailure: false
  upgrade:
    strategy:
      name: RemediateOnFailure
    remediation:
      retries: 4
      strategy: uninstall
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: both-sides-configured
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    remediation:
      retries: 5
      remediateLastFailure: true
      ignoreTestFailures: true
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
      ignoreTestFailures: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: both-retry-on-failure
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 10m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unlabelled
  namespace: apps
spec:
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: explicitly-disabled
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: disabled
spec:
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: legacy-labelled
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: labelled-source
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 30m
  url: https://example.com/catalog.git
