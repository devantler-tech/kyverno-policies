---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opted-in-without-crd-settings
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
spec:
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opted-in-with-existing-settings
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
spec:
  interval: 30m
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Create
    remediation:
      retries: 2
      remediateLastFailure: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: already-configured
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unlabelled
  namespace: apps
spec:
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: explicitly-disabled
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/crds: disabled
spec:
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: legacy-labelled
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
spec:
  interval: 30m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: labelled-source
  namespace: apps
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
spec:
  interval: 30m
  url: https://example.com/catalog.git
