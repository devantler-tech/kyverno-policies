---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-flux-best-practices
  annotations:
    policies.kyverno.io/title: Enforce Flux Best Practices
    policies.kyverno.io/category: Flux, Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Kustomization, HelmRelease
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Validates that Flux Kustomization and HelmRelease resources declare the
      reliability-critical fields recommended by the Flux documentation:
      `interval`, `timeout`, `retryInterval`, garbage collection (`prune`),
      health gating (`wait`), and Helm install/upgrade remediation. Catches
      misconfigured resources at admission instead of waiting for a runtime
      failure.
spec:
  # Audit is the safe catalog default: a policy is inert until a consumer pins
  # and references it, and enforcement rollout is the consumer's decision. A
  # consumer flips this to Enforce in its own adoption change once a clean
  # cluster scan confirms nothing trips the policy.
  validationFailureAction: Audit
  background: true
  rules:
    - name: kustomization-recommended-settings
      match:
        any:
          - resources:
              kinds:
                - kustomize.toolkit.fluxcd.io/v1/Kustomization
      exclude:
        # The bootstrap flux-system Kustomization is created and managed by
        # `flux bootstrap` / ksail and not by GitOps, so the recommended fields
        # cannot be set on it. This is true for every Flux installation, so the
        # exclusion is generic rather than environment-specific.
        any:
          - resources:
              namespaces:
                - flux-system
              names:
                - flux-system
      validate:
        message: >-
          Flux Kustomization must set the recommended reliability fields:
          `spec.interval`, `spec.timeout`, `spec.retryInterval`,
          `spec.prune: true` (garbage collection), `spec.wait: true`
          (health-gated reconciliation), and `spec.sourceRef`.
          See https://fluxcd.io/flux/components/kustomize/kustomizations/#recommended-settings.
        pattern:
          spec:
            interval: "?*"
            timeout: "?*"
            retryInterval: "?*"
            prune: true
            wait: true
            sourceRef:
              kind: "?*"
              name: "?*"
    - name: helmrelease-recommended-settings
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/v2/HelmRelease
                - helm.toolkit.fluxcd.io/v2beta2/HelmRelease
                - helm.toolkit.fluxcd.io/v2beta1/HelmRelease
      validate:
        message: >-
          Flux HelmRelease must declare `spec.interval` and a retry mechanism
          for both install and upgrade — either `strategy.name: RetryOnFailure`
          or `remediation.retries` (`>=1` or `-1`). `timeout` is optional (the
          controller defaults it) and `remediateLastFailure` defaults to true
          once retries are set, so neither is required here.
          See https://fluxcd.io/flux/components/helm/helmreleases/#recommended-settings.
        # anyPattern accepts either retry form (RetryOnFailure strategy or
        # remediation.retries) independently for install and upgrade, matching
        # every shape the Flux recommended settings sanction.
        anyPattern:
          - spec:
              interval: "?*"
              install:
                strategy:
                  name: RetryOnFailure
              upgrade:
                strategy:
                  name: RetryOnFailure
          - spec:
              interval: "?*"
              install:
                strategy:
                  name: RetryOnFailure
              upgrade:
                remediation:
                  retries: ">=1 | -1"
          - spec:
              interval: "?*"
              install:
                remediation:
                  retries: ">=1 | -1"
              upgrade:
                strategy:
                  name: RetryOnFailure
          - spec:
              interval: "?*"
              install:
                remediation:
                  retries: ">=1 | -1"
              upgrade:
                remediation:
                  retries: ">=1 | -1"
