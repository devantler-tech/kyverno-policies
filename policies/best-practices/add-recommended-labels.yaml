---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-recommended-labels
  annotations:
    policies.kyverno.io/title: Add Recommended Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Deployment, StatefulSet, DaemonSet
    policies.kyverno.io/minversion: 1.18.0
    policies.kyverno.io/description: >-
      Adds missing app and app.kubernetes.io/name identity labels to workloads
      without overwriting values supplied by the workload author.
spec:
  background: false
  rules:
    - name: add-workload-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              +(app): "{{ request.object.metadata.name }}"
              +(app.kubernetes.io/name): "{{ request.object.metadata.name }}"
          spec:
            template:
              metadata:
                labels:
                  +(app.kubernetes.io/name): "{{ request.object.metadata.name }}"
