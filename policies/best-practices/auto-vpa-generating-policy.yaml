apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: auto-vpa-daemonset
  annotations:
    policies.kyverno.io/title: Auto VPA for DaemonSets (GeneratingPolicy)
    policies.kyverno.io/category: Autoscaling
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: DaemonSet
    policies.kyverno.io/minversion: 1.18.0
    policies.kyverno.io/description: >-
      Generates a CPU-only recommendation-bounded VerticalPodAutoscaler for each
      DaemonSet. GeneratingPolicy form of the auto-vpa rule of the same name; kept out
      of the catalog until consumers migrate.
spec:
  # Parity with the classic rules' `synchronize: true` + `generateExisting: true`:
  # on GeneratingPolicy both live under spec.evaluation and default to false, so
  # omitting them would silently drop behavior the classic policy guarantees.
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["daemonsets"]
  generate:
    - expression: >-
        generator.Apply(
          string(object.metadata.namespace),
          [
            {
              "apiVersion": dyn("autoscaling.k8s.io/v1"),
              "kind": dyn("VerticalPodAutoscaler"),
              "metadata": dyn({
                "name": string(object.metadata.name) + "-daemonset",
                "namespace": string(object.metadata.namespace)
              }),
              "spec": dyn({
                "targetRef": dyn({
                  "apiVersion": "apps/v1",
                  "kind": "DaemonSet",
                  "name": string(object.metadata.name)
                }),
                "updatePolicy": dyn({"updateMode": "InPlaceOrRecreate"}),
                "resourcePolicy": dyn({
                  "containerPolicies": [
                    {
                      "containerName": dyn("*"),
                      "controlledResources": dyn(["cpu"]),
                      "controlledValues": dyn("RequestsAndLimits"),
                      "minAllowed": dyn({"cpu": "50m"}),
                      "maxAllowed": dyn({"cpu": "1"})
                    }
                  ]
                })
              })
            }
          ]
        )
