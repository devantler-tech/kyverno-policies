---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-flux-best-practices
  annotations:
    policies.kyverno.io/title: Enforce Flux Best Practices
    policies.kyverno.io/category: Flux, Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Kustomization, HelmRelease
    policies.kyverno.io/minversion: 1.18.0
    policies.kyverno.io/description: >-
      Applies an opinionated reliability baseline to Flux Kustomization and
      HelmRelease resources using settings documented by Flux:
      interval, timeout, retryInterval, garbage collection, health gating,
      and Helm install and upgrade remediation.
spec:
  background: true
  rules:
    - name: kustomization-recommended-settings
      match:
        any:
          - resources:
              kinds:
                - kustomize.toolkit.fluxcd.io/v1/Kustomization
      validate:
        failureAction: Audit
        message: >-
          Flux Kustomization must set spec.interval, spec.timeout,
          spec.retryInterval, spec.prune: true, spec.wait: true, and a
          spec.sourceRef kind and name.
        pattern:
          spec:
            interval: "?*"
            timeout: "?*"
            retryInterval: "?*"
            prune: true
            wait: true
            sourceRef:
              kind: "?*"
              name: "?*"
    - name: helmrelease-reconciliation-settings
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/v2/HelmRelease
      validate:
        failureAction: Audit
        message: >-
          Flux HelmRelease must set spec.interval and spec.timeout.
        pattern:
          spec:
            interval: "?*"
            timeout: "?*"
    - name: helmrelease-install-failure-handling
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/v2/HelmRelease
      validate:
        failureAction: Audit
        message: >-
          Flux HelmRelease must configure install remediation retries or use
          the RetryOnFailure install strategy.
        anyPattern:
          - spec:
              install:
                remediation:
                  retries: ">=1 | -1"
          - spec:
              install:
                strategy:
                  name: RetryOnFailure
    - name: helmrelease-upgrade-failure-handling
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/v2/HelmRelease
      validate:
        failureAction: Audit
        message: >-
          Flux HelmRelease must configure upgrade remediation retries with
          last-failure remediation or use the RetryOnFailure upgrade strategy.
        anyPattern:
          - spec:
              upgrade:
                remediation:
                  retries: ">=1 | -1"
                  remediateLastFailure: true
          - spec:
              upgrade:
                strategy:
                  name: RetryOnFailure
